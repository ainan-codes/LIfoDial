name: CI

# Test/build gate the audit (I3) called for: before this, nothing ran pytest or
# built the SPA before code shipped. Runs on every push to main and every PR.
#
# NOTE: Render auto-deploys from main independently of this workflow, so a red
# run here does not physically block that deploy. Treat a failing run as
# "do not merge / roll back", and ideally switch Render to deploy on tagged
# releases so this gate becomes binding.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Force SQLite + dev mode so tests never touch the live Supabase DB and the
      # production-secret boot guard (config.py) stays off. See the repo memory
      # note "backend tests force sqlite".
      DATABASE_URL: "sqlite+aiosqlite:///./ci_test.db"
      ENVIRONMENT: "development"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11" # matches Dockerfile.backend / Dockerfile.agent
          cache: pip

      - name: Install native audio libs (soundfile / pipecat)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg libsndfile1

      - name: Install dependencies
        # Agent deps are required: 3 tests import backend.agent.* (pipecat).
        # requirements.agent.txt pulls in requirements.txt via `-r`.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.agent.txt
          pip install pytest==8.3.5 pytest-asyncio==0.26.0

      - name: Run tests
        run: python -m pytest backend/tests -q

  frontend:
    name: Frontend build (vite)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Production build
        run: npm run build
