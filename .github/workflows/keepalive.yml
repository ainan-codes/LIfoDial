name: Keep Render Services Awake

# Pings the Render free-tier services every ~5 minutes to prevent them from
# sleeping. Render sleeps a free service after ~15 min without inbound HTTP —
# and for the voice worker the LiveKit WebSocket does NOT count as activity,
# only HTTP does. GitHub cron is best-effort (runs can be delayed several
# minutes under load), so */5 leaves margin under the 15-min window.
#
# Worker note: GET / on lifodial-agent returns 200 "OK" only when the worker
# process is healthy AND its LiveKit connection is up (503 otherwise), so this
# ping doubles as a registration check, not just a liveness ping.

on:
  schedule:
    # GitHub cron minimum is 5 minutes. */5 means every 5 minutes.
    - cron: '*/5 * * * *'
  workflow_dispatch:  # also allow manual run from Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping backend /health
        run: |
          echo "Pinging https://lifodial.onrender.com/health"
          for i in 1 2 3; do
            if curl -fsSL --max-time 30 https://lifodial.onrender.com/health; then
              echo ""
              echo "Backend ping OK on attempt $i"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "All 3 attempts failed."
          exit 1

      - name: Ping voice worker / (health + LiveKit registration)
        # --max-time 120: a cold start takes ~60-120s on the free instance.
        run: |
          echo "Pinging https://lifodial-agent.onrender.com/"
          for i in 1 2 3; do
            if curl -fsSL --max-time 120 https://lifodial-agent.onrender.com/; then
              echo ""
              echo "Worker ping OK on attempt $i (200 = alive AND registered with LiveKit)"
              exit 0
            fi
            echo "Attempt $i failed (worker down, cold-starting, or not registered), retrying in 15s..."
            sleep 15
          done
          echo "All 3 attempts failed — worker is down or cannot register with LiveKit."
          exit 1
