##############################################################################
# Lifodial — Render.com deployment configuration
# https://render.com/docs/yaml-spec
#
# Services:
#   1. lifodial-api      — FastAPI backend  (Docker, python:3.11-slim + ffmpeg)
#   2. lifodial-frontend — React frontend   (Render Static Site, Vite build)
#
# One-time setup:
#   1. Push this file to the root of your repo.
#   2. Render dashboard → New → Blueprint → select your repo.
#   3. Fill in the required "sync: false" env vars in the Render dashboard.
##############################################################################

services:

  # ── Backend API (Docker runtime so we get ffmpeg + libpq) ──────────────────
  - type: web
    name: lifodial-api
    runtime: docker
    dockerfilePath: ./Dockerfile.backend
    region: singapore          # closest to India / Middle East
    plan: starter              # upgrade to standard when load grows
    healthCheckPath: /health

    envVars:
      # ── Runtime ─────────────────────────────────────────────────────────────
      - key: ENVIRONMENT
        value: production
      - key: FORCE_REDEPLOY
        value: "v1.1.0-full-voice-pipeline"   # bump this to force a redeploy

      - key: PORT
        value: "10000"          # Render injects $PORT; Dockerfile CMD uses 8000 → overridden

      # ── Database — paste your Supabase/Neon/Render Postgres URL ─────────────
      - key: DATABASE_URL
        sync: false             # postgresql+asyncpg://user:pass@host/db

      # ── App secrets ──────────────────────────────────────────────────────────
      - key: SECRET_KEY
        generateValue: true     # Render auto-generates on first deploy
      - key: ENCRYPTION_KEY
        sync: false             # optional 32-byte base64 key

      # ── CORS: add your Vercel frontend URL here ───────────────────────────────
      # Example: https://lifodial.vercel.app
      - key: CORS_ORIGIN
        sync: false

      # ── Sarvam AI ─────────────────────────────────────────────────────────────
      - key: SARVAM_API_KEY
        sync: false

      # ── Google Gemini ─────────────────────────────────────────────────────────
      - key: GEMINI_API_KEY
        sync: false

      # ── OpenAI (LLM + Whisper STT + OpenAI TTS) ──────────────────────────────
      - key: OPENAI_API_KEY
        sync: false

      # ── Anthropic Claude ──────────────────────────────────────────────────────
      - key: ANTHROPIC_API_KEY
        sync: false

      # ── Groq ──────────────────────────────────────────────────────────────────
      - key: GROQ_API_KEY
        sync: false

      # ── DeepSeek ──────────────────────────────────────────────────────────────
      - key: DEEPSEEK_API_KEY
        sync: false

      # ── Mistral ───────────────────────────────────────────────────────────────
      - key: MISTRAL_API_KEY
        sync: false

      # ── ElevenLabs TTS ────────────────────────────────────────────────────────
      - key: ELEVENLABS_API_KEY
        sync: false

      # ── Deepgram STT ──────────────────────────────────────────────────────────
      - key: DEEPGRAM_API_KEY
        sync: false

      # ── AssemblyAI STT ────────────────────────────────────────────────────────
      - key: ASSEMBLYAI_API_KEY
        sync: false

      # ── LiveKit (optional telephony) ──────────────────────────────────────────
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false

      # ── Vobiz (optional telephony — India PSTN) ───────────────────────────────
      - key: VOBIZ_ACCOUNT_SID
        sync: false
      - key: VOBIZ_AUTH_TOKEN
        sync: false
      - key: VOBIZ_VIRTUAL_NUMBER
        sync: false

      # ── Sentry (optional error tracking) ─────────────────────────────────────
      - key: SENTRY_DSN
        sync: false

  # ── Voice agent worker (Pipecat/LiveKit) ──────────────────────────────────
  # Long-running background worker that registers with LiveKit and is dispatched
  # into a room per call. MUST be a background_worker (NOT a web service): it
  # holds a persistent WebSocket to LiveKit and must never spin down, which free
  # web services do after inactivity. Background workers require a paid instance.
  # agent_name is fixed in code (backend/agent/pipeline.py::AGENT_NAME) and MUST
  # match backend/routers/web_calls.py::AGENT_NAME.
  - type: worker
    name: lifodial-agent
    runtime: docker
    dockerfilePath: ./Dockerfile.agent
    region: singapore
    plan: starter            # background workers are not available on free
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false          # MUST equal the API service's SECRET_KEY (Fernet-at-rest)
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: SARVAM_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false

  # ── Frontend (React / Vite — built as static site) ────────────────────────
  - type: web
    name: lifodial-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    region: singapore
    plan: starter
    pullRequestPreviewsEnabled: true

    routes:
      # SPA fallback — serve index.html for all paths so React Router works
      - type: rewrite
        source: /*
        destination: /index.html

    headers:
      # Security headers for the SPA
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable

    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: lifodial-api
          property: url
